# Apache virtual host — themaniak.online (games replace shop)
# Enable: sudo a2ensite themaniak.online.conf && sudo systemctl reload apache2
# Requires: mod_rewrite, AllowOverride All

<VirtualHost *:80>
    ServerName themaniak.online
    ServerAlias www.themaniak.online
    Redirect permanent / https://themaniak.online/
</VirtualHost>

<VirtualHost *:443>
    ServerName themaniak.online
    ServerAlias www.themaniak.online

    DocumentRoot /var/www/themaniak.online/public

    <Directory /var/www/themaniak.online/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/themaniak-error.log
    CustomLog ${APACHE_LOG_DIR}/themaniak-access.log combined

    # SSL — use certbot: sudo certbot --apache -d themaniak.online -d www.themaniak.online
    SSLEngine on
    # SSLCertificateFile /etc/letsencrypt/live/themaniak.online/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/themaniak.online/privkey.pem
</VirtualHost>
