# Render blueprint — https://render.com
# Dashboard → New → Blueprint → connect repo with this file

services:
  - type: web
    name: themaniak-games
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /up
    preDeployCommand: php artisan migrate --force --no-interaction && php artisan db:seed --class=OwnerSeeder --force --no-interaction
    envVars:
      - key: APP_NAME
        value: The Maniak
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://themaniak.online
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_DATABASE
        value: defaultdb
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_DOMAIN
        value: .themaniak.online
      - key: SESSION_SECURE_COOKIE
        value: true
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
