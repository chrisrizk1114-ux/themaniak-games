name: Keep site awake

on:
  schedule:
    # Render free tier sleeps after ~15 min idle — ping every 5 minutes.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Warm themaniak.online
        run: |
          set -e
          for path in /up / /board-game /whack-a-mole /login; do
            curl -fsS --max-time 90 "https://themaniak.online${path}" >/dev/null &
          done
          wait

      - name: Warm Render direct URL
        run: curl -fsS --max-time 90 "https://themaniak-games.onrender.com/up" >/dev/null
